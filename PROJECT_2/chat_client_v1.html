<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WebSocket Chat</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: url("/home/user/Downloads/app2.jpg");
    background-position: center center;
    background-repeat: no-repeat;
    background-size: cover;       
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 600px;
    background: rgba(20, 20, 30, 0.9);
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(255,255,255,0.1);
}

h2 {
    text-align: center;
    color: #ffffff;
    margin-bottom: 20px;
    letter-spacing: 1px;
}

.username-section {
    display: flex;
    gap: 12px;
    margin-bottom: 15px;
}

#usernameInput,
#receiverInput,
#messageInput {
    flex: 1;
    padding: 10px 14px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 14px;
    background: rgba(255,255,255,0.1);
    color: #ffffff;
    transition: 0.3s ease;
}

#usernameInput::placeholder,
#receiverInput::placeholder,
#messageInput::placeholder {
    color: rgba(255,255,255,0.6);
}

#usernameInput:focus,
#receiverInput:focus,
#messageInput:focus {
    background: rgba(255,255,255,0.18);
}

#messageInput {
    resize: none;
    height: 45px;
}

#connectBtn,
.send-btn {
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s ease;
    min-width: 130px;
}

#connectBtn {
    background: linear-gradient(135deg, #4e73df, #224abe);
    color: white;
}

#connectBtn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(78,115,223,0.5);
}

#connectBtn:disabled {
    background: gray;
    cursor: not-allowed;
    box-shadow: none;
}

.status {
    text-align: center;
    margin-bottom: 12px;
    font-weight: bold;
    color: #ffffff;
}

#chatBox {
    height: 420px;
    border-radius: 15px;
    padding: 15px;
    overflow-y: auto;
    margin-bottom: 15px;
    background: rgba(255,255,255,0.08);
    display: flex;
    flex-direction: column;
    backdrop-filter: blur(10px);
}

#chatBox::-webkit-scrollbar {
    width: 8px;
}

#chatBox::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.3);
    border-radius: 10px;
}

.message {
    padding: 10px 14px;
    margin: 6px 0;
    border-radius: 18px 18px 18px 1px;
    max-width: 75%;
    word-wrap: break-word;
    white-space: pre-wrap;
    font-size: 24px;
    line-height: 1.4;
}

.server-msg {
    align-self: flex-start;
    background: linear-gradient(to bottom left, #3f37c9, #6c63ff);
    color: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.client-msg {
    align-self: flex-end;
    background: linear-gradient(to bottom left, #007a65, #02ae94);
    color: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

#receiverInput,
#messageInput {
    flex: 1 1 0;
    min-width: 0;
}

.input-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    align-items: stretch;
}

#privateBtn,
#publicBtn {
    width: 140px;
    flex-shrink: 0;
}

#publicBtn {
    background: linear-gradient(135deg, #00c851, #007e33);
    color: white;
}

#publicBtn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(0,200,81,0.5);
}

#privateBtn {
    background: linear-gradient(135deg, #ff4444, #cc0000);
    color: white;
}

#privateBtn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(255,68,68,0.5);
}
</style>
</head>

<body>

<div class="container">

<h2>WEBSOCKET CHAT SERVER</h2>

<div class="username-section">
    <input type="text" id="usernameInput" placeholder="Enter username">
    <button id="connectBtn">CONNECT</button>
</div>

<div class="status" id="status"></div>

<div id="chatBox"></div>

<div class="input-row">
    <input type="text" id="receiverInput" placeholder="Enter receiver username (for private)">
    <button id="privateBtn" class="send-btn">SEND PRIVATE</button>
</div>

<div class="input-row">
    <textarea id="messageInput" placeholder="Enter message"></textarea>
    <button id="publicBtn" class="send-btn">SEND PUBLIC</button>
</div>

</div>

<script>

let socket = null;
let username = "";
let connected = false;

const MAX_MESSAGE_LENGTH = 8000;
const chatBox = document.getElementById("chatBox");
const statusDiv = document.getElementById("status");
const input = document.getElementById("messageInput");
const usernameInput = document.getElementById("usernameInput");
const connectBtn = document.getElementById("connectBtn");
const receiverInput = document.getElementById("receiverInput");

connectBtn.onclick = function() {

    if (connected) return;

    username = usernameInput.value.trim();
    if(username === "") {
        alert("Enter username");
        return;
    }

    if(username.includes(":")){
        alert("Username can't contain colon");
        return;
    }

    socket = new WebSocket("ws://localhost:8080");

    socket.onopen = function() {
        socket.send("REGISTER:" + username);
    };

    socket.onerror = function() {
        alert("Connection failed");
    };

    socket.onmessage = function(event) {


    if (event.data === "Registered successfully") {
        connected = true;
        statusDiv.textContent = "Connected";
        statusDiv.style.color = "green";
        usernameInput.disabled = true;
        connectBtn.disabled = true;
        return;
    }

    if (event.data === "Message limit exceeded") {
        alert("Message limit exceeded (max 8000 characters)");
        return;
    }

    if (event.data === "User not available") {
        alert("User not found");
        return;
    }

    if (event.data === "Username already available") {
        alert("Username already chosen");

        socket.close();
        connected = false;
        usernameInput.disabled = false;
        connectBtn.disabled = false;
        statusDiv.textContent = "Disconnected";
        statusDiv.style.color = "red";

        return;
    }

        const msg = document.createElement("div");
        msg.className = "message server-msg";
        msg.textContent = event.data;
        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
    };

    socket.onclose = function() {
        connected = false;
        statusDiv.textContent = "Disconnected";
        statusDiv.style.color = "red";
    };
};

document.getElementById("publicBtn").onclick = function() {

    if(!connected || socket.readyState !== WebSocket.OPEN) {
        alert("Not connected");
        return;
    }

    const message = input.value.trim();
    if(message === "") return;

    if (message.length > MAX_MESSAGE_LENGTH) {
        alert("Message limit exceeded (max 8000 characters)");
        return;
    }
    
    socket.send("PUBLIC:" + message);

    const msg = document.createElement("div");
    msg.className = "message client-msg";
    msg.textContent = "You (Public): " + message;
    chatBox.appendChild(msg);

    chatBox.scrollTop = chatBox.scrollHeight;
    input.value = "";
};

document.getElementById("privateBtn").onclick = function() {

    if(!connected || socket.readyState !== WebSocket.OPEN) {
        alert("Not connected");
        return;
    }

    const receiver = receiverInput.value.trim();
    const message = input.value.trim();

    if(receiver === "") {
        alert("Enter receiver username");
        return;
    }

    if(message === "") return;

    if (message.length > MAX_MESSAGE_LENGTH) {
        alert("Message limit exceeded (max 8000 characters)");
        return;
    }
    
    socket.send("PRIVATE:" + receiver + ":" + message);

    const msg = document.createElement("div");
    msg.className = "message client-msg";
    msg.textContent = "You (Private to " + receiver + "): " + message;
    chatBox.appendChild(msg);

    chatBox.scrollTop = chatBox.scrollHeight;
    input.value = "";
};

usernameInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        connectBtn.click();
    }
});

</script>

</body>
</html>
